# Chat page + widget.js static serving, /api proxied same-origin to the
# backend container. proxy_buffering MUST stay off: /api/chat is an SSE
# stream — buffering would hold deltas until the response completes.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # CHO-262 admin trace viewer: served from its own built HTML entry. The
    # bare /traces path maps to traces.html; /traces.html is served directly by
    # the try_files fallthrough below.
    location = /traces {
        try_files /traces.html =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
